name: Daily Data Update
on:
  schedule:
    - cron: '0 8 * * 1-5'   # 16:00 CST
    - cron: '30 8 * * 1-5'  # 16:30
    - cron: '0 9 * * 1-5'   # 17:00
    - cron: '30 9 * * 1-5'  # 17:30
    - cron: '0 10 * * 1-5'  # 18:00
    - cron: '30 10 * * 1-5' # 18:30
    - cron: '0 11 * * 1-5'  # 19:00
    - cron: '30 11 * * 1-5' # 19:30
    - cron: '0 12 * * 1-5'  # 20:00
    - cron: '30 12 * * 1-5' # 20:30
    - cron: '0 13 * * 1-5'  # 21:00
  workflow_dispatch:
    inputs:
      mode:
        description: '数据拉取模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
      symbol:
        description: '品种，用逗号分隔 (如 TA,MA,SA,SR,CF,RM,OI,C,M,I,PG,L,V,PP,P,Y,CU,AL,ZN,RB,AU,AG,RU,SC  )，空=全部'
        required: false
        default: ''
        type: string
      year:
        description: '年份 (full模式，如2026)'
        required: false
        default: '0'
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch data (incremental)
        run: python scripts/fetch_data.py --output data.json --recent 5
        if: github.event_name == 'schedule' || inputs.mode == 'incremental'
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          GH_UPLOAD_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}

      - name: Fetch data (full history)
        run: python scripts/fetch_data.py --output data.json --year ${{ inputs.year }} --symbol "${{ inputs.symbol }}"
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          GH_UPLOAD_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}

      - name: Upload to D1
        run: |
          if [ -f data.json ]; then
            python scripts/upload_to_d1.py --input data.json
          else
            echo "无数据文件，跳过上传"
          fi
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          GH_UPLOAD_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}
