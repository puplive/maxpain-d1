name: Daily Data Update
on:
  schedule:
    - cron: '0 8 * * 1-5'   # 16:00 CST
    - cron: '30 8 * * 1-5'  # 16:30
    - cron: '0 9 * * 1-5'   # 17:00
    - cron: '30 9 * * 1-5'  # 17:30
    - cron: '0 10 * * 1-5'  # 18:00
    - cron: '30 10 * * 1-5' # 18:30
    - cron: '0 11 * * 1-5'  # 19:00
    - cron: '30 11 * * 1-5' # 19:30
    - cron: '0 12 * * 1-5'  # 20:00
    - cron: '30 12 * * 1-5' # 20:30
    - cron: '0 13 * * 1-5'  # 21:00
  workflow_dispatch:
    inputs:
      mode:
        description: '数据拉取模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
      symbol:
        description: '品种，用逗号分隔，空=全部'
        required: false
        default: ''
        type: string
      year:
        description: '年份 (full模式，如2026)'
        required: false
        default: '0'
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 定时任务：检查今日数据是否已更新，避免重复运行
      - name: Check if already updated today
        id: check
        if: github.event_name == 'schedule'
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "检查今日数据是否已更新... (今日: $TODAY)"
          STATS=$(curl -s --max-time 10 -H "Authorization: Bearer $D1_API_KEY" "$WORKER_URL/api/stats" 2>/dev/null || echo '{}')
          echo "API 返回: ${STATS:0:200}"
          LAST_DATE=$(echo "$STATS" | jq -r '.stats // [] | map(.last) | sort | last // ""')
          if [ -n "$LAST_DATE" ] && { [ "$LAST_DATE" \> "$TODAY" ] || [ "$LAST_DATE" = "$TODAY" ]; }; then
            echo "already_updated=true" >> $GITHUB_OUTPUT
            echo "✅ 今日数据已更新 (最新: $LAST_DATE)，跳过后续步骤"
          else
            echo "already_updated=false" >> $GITHUB_OUTPUT
            echo "📥 数据尚未更新 (最新: ${LAST_DATE:-未知})，继续执行"
          fi
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}

      - uses: actions/checkout@v6
        if: steps.check.outputs.already_updated != 'true'

      - uses: actions/setup-python@v6
        if: steps.check.outputs.already_updated != 'true'
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.already_updated != 'true'
        run: pip install -r scripts/requirements.txt

      - name: Fetch data (incremental)
        if: (steps.check.outputs.already_updated != 'true') && (github.event_name == 'schedule' || inputs.mode == 'incremental')
        run: python scripts/fetch_data.py --output data.json --recent 5
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          GH_UPLOAD_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}

      - name: Fetch data (full history)
        if: (steps.check.outputs.already_updated != 'true') && (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: python scripts/fetch_data.py --output data.json --year ${{ inputs.year }} --symbol "${{ inputs.symbol }}"
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          GH_UPLOAD_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}

      - name: Upload to D1
        if: steps.check.outputs.already_updated != 'true'
        run: |
          if [ -f data.json ]; then
            python scripts/upload_to_d1.py --input data.json
          else
            echo "无数据文件，跳过上传"
          fi
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          GH_UPLOAD_TOKEN: ${{ secrets.GH_UPLOAD_TOKEN }}
